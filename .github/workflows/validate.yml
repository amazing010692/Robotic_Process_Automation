name: Validate UiPath Projects

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate project structure
        run: chmod +x scripts/validate.sh && ./scripts/validate.sh

      - name: Check for sensitive files
        run: |
          echo "🔒 Checking for sensitive files..."
          SENSITIVE=$(find . -name "*.pem" -o -name "*.key" -o -name ".env" | grep -v node_modules || true)
          if [ -n "$SENSITIVE" ]; then
            echo "❌ Potentially sensitive files detected:"
            echo "$SENSITIVE"
            exit 1
          fi
          echo "✅ No sensitive files detected"
